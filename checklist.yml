description: Configuration file for checklist::check_pkg()
package: yes
allowed:
  warnings:
  - motivation: require other INBO packages
    value: |-
      checking CRAN incoming feasibility ... WARNING
      Maintainer: 'Thierry Onkelinx <thierry.onkelinx@inbo.be>'

      New submission

      Strong dependencies not in mainstream repositories:
        n2kanalysis
      Suggests or Enhances not in mainstream repositories:
        effectclass, INBOmd, INBOtheme
      Availability using Additional_repositories specification:
        n2kanalysis   yes   https://inbo.r-universe.dev
        effectclass   yes   https://inbo.r-universe.dev
        INBOmd        yes   https://inbo.r-universe.dev
        INBOtheme     yes   https://inbo.r-universe.dev
  notes: []
required:
- CITATION
- DESCRIPTION
- R CMD check
- checklist
- codemeta
- documentation
- filename conventions
- folder conventions
- license
- lintr
- organisation
- repository secret
- spelling
spelling:
  default: en-GB
  ignore:
  - .github
  - LICENSE.md
  - inst/website/LICENSE.md
  other:
    nl-BE:
    - inst/interactive/composite.qmd
    - inst/interactive/composite_pdf.qmd
    - inst/interactive/index.md
    - inst/interactive/methodologie/index.qmd
    - inst/interactive/methodologie/inzameling.qmd
    - inst/interactive/methodologie/reproduceerbaarheid.qmd
    - inst/interactive/methodologie/verwerking.qmd
    - inst/interactive/methodologie/voorstelling.qmd
    - inst/interactive/samenvatting.md
    - inst/interactive/species.qmd
    - inst/interactive/species_pdf.qmd
    - inst/interactive/trends.qmd
    - inst/interactive/trends_pdf.qmd
    - inst/interactive/vbp_species.qmd
pak:
- inbo/n2kanalysis@0.4.1
- pdftools
